services:
  - type: web
    name: ai-persona-interview-agent
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt && python scripts/ingest.py
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8
      - key: PERSONA_NAME
        sync: false
      - key: PERSONA_EMAIL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: OPENAI_EMBEDDING_API_KEY
        sync: false
      - key: EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: CALCOM_API_KEY
        sync: false
      - key: CALCOM_EVENT_TYPE_ID
        sync: false
      - key: VOICE_WEBHOOK_SECRET
        generateValue: true
